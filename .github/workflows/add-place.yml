name: Add Place from Issue

on:
  issues:
    types: [opened, labeled]

jobs:
  add-place:
    # Only run if the issue has the label "add-place"
    if: contains(github.event.issue.labels.*.name, 'add-place')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Extract Google Maps URL from issue body
        id: extract
        run: |
          # Pull the first Google Maps link from the issue body
          BODY="${{ github.event.issue.body }}"
          URL=$(echo "$BODY" | grep -oE 'https://www\.google\.com/maps/[^ ]+' | head -1)
          if [ -z "$URL" ]; then
            # Fall back to using the issue title as the place name
            URL="${{ github.event.issue.title }}"
          fi
          echo "place_input=$URL" >> $GITHUB_OUTPUT

      - name: Run add_place.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python add_place.py "${{ steps.extract.outputs.place_input }}"

      - name: Commit updated places.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add places.json
          git diff --staged --quiet || git commit -m "Add place: ${{ github.event.issue.title }}"
          git push

      - name: Close the issue with a comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ **Place added!** The map will update in about 30 seconds at your GitHub Pages URL.\n\nIf the pin landed in the wrong spot or the details look off, edit \`places.json\` directly to fix it.`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
